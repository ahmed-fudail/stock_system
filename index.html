<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>SAP Material Search - Sirt Oil</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
    --primary:#003366;
    --accent:#1e88e5;
}

/* ================= BODY ================= */
body{
    font-family:'Segoe UI',Tahoma;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
    padding:20px;
    color:#fff;
}

/* ================= CONTAINER ================= */
.container{
    max-width:1100px;
    margin:auto;
    background:rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    border-radius:28px;
    padding:70px 30px 60px;
    box-shadow:0 25px 45px rgba(0,0,0,.45);
    position:relative;
}

/* ================= DEV CARD ================= */
.dev-card{
    position:absolute;
    top:20px;
    left:20px;

    background:linear-gradient(
        135deg,
        rgba(30,136,229,0.55),
        rgba(0,51,102,0.55)
    );
    backdrop-filter: blur(14px);
    border-radius:22px;
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:16px;
    border:1px solid rgba(255,255,255,.35);
    box-shadow:0 18px 35px rgba(0,0,0,.45);
    transition:.35s ease;
    z-index:10;
}

.dev-card:hover{
    transform:translateY(-6px);
    box-shadow:0 30px 55px rgba(30,136,229,.55);
}

.dev-info{
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:13px;
}

.dev-info small{
    letter-spacing:2px;
    opacity:.85;
}

.dev-info strong{
    font-size:16px;
    font-weight:700;
}

.dev-phone{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:600;
}

.dev-icon{
    width:44px;
    height:44px;
    border-radius:14px;
    background:rgba(255,255,255,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

/* ================= HEADER ================= */
.header{
    text-align:center;
    margin-bottom:35px;
}

.logo{
    max-width:120px;
    margin-bottom:15px;
}

h2{
    margin:10px 0;
    font-weight:800;
}

.subtitle{
    opacity:.85;
    font-size:14px;
}

/* ================= SEARCH ================= */
.search-box{
    margin-top:25px;
}

.search-box input{
    width:100%;
    padding:18px;
    font-size:18px;
    border-radius:50px;
    border:none;
    outline:none;
    text-align:center;
}

/* ================= TABLE ================= */
.table-container{
    margin-top:35px;
    border-radius:16px;
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
    direction:ltr;
    background:#0b1f3a;
}

th{
    background:#001a3a;
    padding:14px;
}

td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,.1);
}

tr:hover{background:rgba(255,255,255,.05)}

/* ================= MOBILE FIX ================= */
@media (max-width: 768px){

    .container{
        padding:110px 18px 40px;
    }

    .dev-card{
        left:50%;
        transform:translateX(-50%);
        top:18px;
        width:90%;
        justify-content:center;
    }

    .dev-card:hover{
        transform:translateX(-50%);
    }

    h2{
        font-size:20px;
    }

    .subtitle{
        font-size:13px;
    }

    .search-box input{
        font-size:16px;
        padding:16px;
    }
}

/* ================= PRINT ================= */
@media print{
    .dev-card,.search-box{display:none}
    body{background:#fff;color:#000}
    .container{box-shadow:none;background:#fff}
}
</style>
</head>

<body>

<div class="container">

    <!-- DEV CARD -->
    <div class="dev-card">
        <div class="dev-info">
            <small>DEVELOPED BY</small>
            <strong>AHMED.F</strong>
            <div class="dev-phone">📞 22333</div>
        </div>
        <div class="dev-icon">👨‍💻</div>
    </div>

    <!-- HEADER -->
    <div class="header">
        <img src="image_d6ce3f.png"
             onerror="this.src='https://raw.githubusercontent.com/ahmed-fudail/stock_system/main/image_d6ce3f.png'"
             class="logo">
        <h2>SAP Material Search System</h2>
        <div class="subtitle">
            نظام إدارة والبحث عن قطع الغيار – شركة سرت لإنتاج وتصنيع النفط والغاز
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input id="q" type="text" placeholder="ابحث برقم المادة أو الوصف">
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table id="result"></table>
    </div>

</div>

<script>
const q=document.getElementById("q");
const table=document.getElementById("result");

q.onkeyup=async()=>{
 if(q.value.length<2){table.innerHTML="";return;}
 const r=await fetch(`/search?q=${encodeURIComponent(q.value)}`);
 const d=await r.json();
 let h=`<thead><tr>
 <th>Material No</th><th>Description</th><th>Price</th>
 <th>Currency</th><th>Unit</th></tr></thead><tbody>`;
 d.forEach(x=>{
 h+=`<tr>
 <td><b>${x[0]}</b></td>
 <td>${x[1]}</td>
 <td style="color:#ff6b6b">${x[2]}</td>
 <td>${x[3]}</td>
 <td>${x[4]}</td>
 </tr>`;
 });
 h+="</tbody>";
 table.innerHTML=h;
}
</script>

</body>
</html>
