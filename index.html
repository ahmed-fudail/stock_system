<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <title>SAP Material Search - Sirt Oil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --primary-color: #003366; 
            --secondary-color: #f4f7f9;
            --accent-color: #28a745; 
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--secondary-color);
        }

        .logo {
            max-width: 130px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }

        h2 {
            color: var(--primary-color);
            margin: 5px 0;
            font-weight: 700;
        }

        .search-box input {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border-radius: 50px;
            border: 2px solid #e0e0e0;
            outline: none;
            transition: 0.3s;
            text-align: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0,51,102,0.15);
        }

        .table-container {
            margin-top: 25px;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            direction: ltr; /* جعل محتوى الجدول من اليسار لليمين لأنه إنجليزي */
        }

        th {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            font-size: 14px;
            text-align: left;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            text-align: left;
        }

        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #edf2f7; }

        .btn-print {
            display: inline-block;
            margin-bottom: 10px;
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-print:hover { background: #218838; }

        @media print {
            .search-box, .btn-print { display: none; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="image_d6ce3f.png" 
             onerror="this.src='https://raw.githubusercontent.com/ahmed-fudail/stock_system/main/image_d6ce3f.png'" 
             alt="Sirt Oil Co." 
             class="logo">
        <h2>SAP Material Search System</h2>
    </div>

    <div class="search-box">
        <input type="text" id="q" placeholder="Search by Material No or Description..." autofocus>
    </div>

    <div id="controls" style="display:none; text-align: right; direction: ltr;">
        <button class="btn-print" onclick="window.print()">Print Results</button>
    </div>

    <div class="table-container">
        <table id="result"></table>
    </div>
</div>

<script>
const input = document.getElementById("q");
const table = document.getElementById("result");
const controls = document.getElementById("controls");

input.onkeyup = async () => {
    if (input.value.length < 2) {
        table.innerHTML = "";
        controls.style.display = "none";
        return;
    }

    try {
        const r = await fetch(`/search?q=${encodeURIComponent(input.value)}`);
        const data = await r.json();

        if (data.length === 0) {
            table.innerHTML = "<tr><td style='text-align:center; padding:20px;'>No results found</td></tr>";
            controls.style.display = "none";
            return;
        }

        controls.style.display = "block";
        let html = `<thead><tr>
            <th>Material No</th>
            <th>Material Description</th>
            <th>Price</th>
            <th>Currency</th>
            <th>Unit</th>
        </tr></thead><tbody>`;

        data.forEach(row => {
            html += `<tr>
                <td><strong>${row[0]}</strong></td>
                <td>${row[1]}</td>
                <td style="font-weight:bold; color:#d32f2f;">${row[2]}</td>
                <td>${row[3]}</td>
                <td>${row[4]}</td>
            </tr>`;
        });
        html += "</tbody>";
        table.innerHTML = html;
    } catch (e) {
        console.error("Connection error");
    }
};
</script>

</body>
</html>
